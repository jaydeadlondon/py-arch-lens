layers:
  - name: interface
    modules:
      - "src.cli"
      - "src.tui"
      - "src.formatting*"
    may_depend_on:
      - application
      - reports
      - rules
      - queries
      - history
      - core
  - name: application
    modules:
      - "src.analyzer"
    may_depend_on:
      - core
      - rules
  - name: queries
    modules:
      - "src.dependency_queries"
    may_depend_on:
      - core
  - name: history
    modules:
      - "src.snapshots"
    may_depend_on:
      - core
      - rules
      - queries
      - reports
  - name: core
    modules:
      - "src.config"
      - "src.scanner"
      - "src.parser"
      - "src.graph"
      - "src.models"
    may_depend_on: []
  - name: reports
    modules:
      - "src.reports.*"
    may_depend_on:
      - core
      - rules
      - queries
  - name: rules
    modules:
      - "src.rules"
      - "src.validator"
    may_depend_on:
      - core

forbidden_imports:
  - source: "src.*"
    target: "tests.*"
    reason: "Runtime package must not import test modules"
    severity: error

ignore:
  - source: "src.cli"
    target: "src.tui"
